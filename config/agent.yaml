agent_id: default
system_prompt: |
  You are a helpful, concise voice-style assistant. Keep replies short and
  conversational. Use tools only when needed. Do not fabricate tool results.
  When a tool is slow, give a short progress update rather than waiting silently.
provider: gemini
model: gemini-2.5-flash
temperature: 0.3
max_tokens: 1024
history_limit: 30
tool_groups: []

ack:
  enabled: false
  phrases:
    - "Sure, I'll check that."
    - "Got it, let me look into it."
    - "Understood, I'll work through that."
    - "Okay, looking at that now."

mcp_servers: []

subagents:
  enabled: true
  max_children: 4
  max_iters: 4
  timeout_s: 45

timeouts:
  tool_s: 10
  mcp_s: 10
  llm_first_token_s: 8

tracing:
  enabled: true

voice:
  transport: livekit

  # Local-first defaults: LiveKit handles rooms, WebRTC, turn timing, and
  # interruption flow while the current local models/runtime do the work.
  stt:
    provider: local
    model_id:
    model:
    language: en
    options: {}

  llm:
    provider: runtime
    model:
    options: {}

  tts:
    provider: local
    model:
    model_path: kokoro-v1.0.onnx
    voices_path: voices-v1.0.bin
    voice: af_heart
    speed: 1.0
    lang: en-us
    options: {}

  # For managed low-latency models, switch providers and model names, e.g.
  # stt: { provider: livekit, model: deepgram/nova-3, language: en }
  # llm: { provider: livekit, model: openai/gpt-4o-mini }
  # tts: { provider: livekit, model: cartesia/sonic-3, voice: "<voice-id>" }
  livekit:
    url:
    agent_name: examiner-agent
    dispatch_mode: explicit
    room_prefix: examiner
    participant_prefix: user
    metadata: {}

  turn_detection:
    provider: livekit
    mode: turn_detector
    preemptive_generation: true
    endpointing: {}
    interruption: {}

  vad:
    threshold: 0.5
    min_silence_ms: 500
    speech_pad_ms: 200
    max_utterance_s: 30.0

  barge_in:
    enabled: true
    min_speech_ms: 420
    min_rms: 0.012

  echo_tail_s: 0.7
